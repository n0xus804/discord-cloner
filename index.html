<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Dynasty Cloner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
        }
        .container {
            background: linear-gradient(145deg, #12122a, #1a1a3e);
            border: 2px solid #6a2be0;
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 0 40px rgba(106, 43, 224, 0.3);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: #b388ff;
            text-align: center;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .header .subtitle {
            color: #7c7cb0;
            font-size: 11px;
            text-align: center;
            letter-spacing: 4px;
        }
        .glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6a2be0, #00e5ff, transparent);
            margin: 18px 0 25px;
        }
        .input-group { margin-bottom: 14px; }
        .input-group label {
            display: block;
            color: #9a9ad6;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(106, 43, 224, 0.3);
            border-radius: 12px;
            color: #d0d0ff;
            font-size: 14px;
            outline: none;
        }
        .settings-panel {
            margin: 14px 0 18px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(106, 43, 224, 0.15);
        }
        .settings-panel .settings-title {
            color: #7c7cb0;
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }
        .settings-grid label {
            color: #9a9ad6;
            font-size: 10px;
            cursor: pointer;
        }
        .settings-grid input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(106, 43, 224, 0.4);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .settings-grid input[type="checkbox"]:checked {
            background: #6a2be0;
            border-color: #6a2be0;
        }
        .settings-grid input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
            padding-left: 3px;
        }
        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-start {
            background: linear-gradient(135deg, #6a2be0, #8b5cf6);
            color: white;
        }
        .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-stop {
            background: linear-gradient(135deg, #e94560, #c62828);
            color: white;
            display: none;
        }
        .btn-stop.show { display: block; }
        .tabs {
            display: flex;
            gap: 6px;
            margin-top: 20px;
            border-bottom: 1px solid rgba(106, 43, 224, 0.2);
            padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #5a5a8a;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #b388ff;
            background: rgba(106, 43, 224, 0.15);
        }
        .log-container {
            margin-top: 6px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(106, 43, 224, 0.15);
            border-radius: 12px;
            color: #a0a0d0;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            max-height: 200px;
            overflow-y: auto;
            min-height: 100px;
        }
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.idle { background: #4a4a7a; }
        .status-dot.running { background: #00e5ff; }
        .status-dot.done { background: #4caf50; }
        .status-dot.error { background: #e94560; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="title">FLUX DYNASTY</h1>
        <div class="subtitle">✦ SERVER CLONER v2.0 ✦</div>
    </div>
    <div class="glow-line"></div>

    <div class="input-group">
        <label>🔑 Token</label>
        <input type="text" id="token" placeholder="Введите токен...">
    </div>
    <div class="input-group">
        <label>📂 Source Server ID</label>
        <input type="text" id="source" placeholder="ID исходного сервера...">
    </div>
    <div class="input-group">
        <label>🎯 Target Server ID</label>
        <input type="text" id="target" placeholder="ID целевого сервера...">
    </div>

    <div class="settings-panel">
        <div class="settings-title">⚙️ Что копировать</div>
        <div class="settings-grid">
            <label><input type="checkbox" id="copyRoles" checked> Роли</label>
            <label><input type="checkbox" id="copyChannels" checked> Каналы</label>
            <label><input type="checkbox" id="copyCategories" checked> Категории</label>
            <label><input type="checkbox" id="copyVoice" checked> Голосовые</label>
            <label><input type="checkbox" id="copyEmojis" checked> Эмодзи</label>
            <label><input type="checkbox" id="copySettings" checked> Настройки</label>
            <label><input type="checkbox" id="copyIcon" checked> Иконка</label>
            <label><input type="checkbox" id="copyAutoMod" checked> AutoMod</label>
        </div>
    </div>

    <div class="button-row">
        <button class="btn btn-start" id="startBtn">▶ СТАРТ</button>
        <button class="btn btn-stop" id="stopBtn">⏹ СТОП</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="userTabBtn">👤 Лог</button>
        <button class="tab-btn" id="devTabBtn" style="display:none;">⚙️ Dev</button>
    </div>

    <div id="userLog" class="log-container">
        <span class="status-dot idle"></span> Ожидание запуска...
    </div>
    <div id="devLog" class="log-container" style="display:none;">
        <span class="status-dot idle"></span> Dev Log
    </div>
</div>

<script>
// ==================== МИНИМАЛЬНЫЙ РАБОЧИЙ КОД ====================
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let isRunning = false;
let shouldStop = false;

document.getElementById('startBtn').onclick = async function() {
    if (isRunning) return;
    
    const token = document.getElementById('token').value.trim();
    const sourceId = document.getElementById('source').value.trim();
    const targetId = document.getElementById('target').value.trim();
    
    if (!token || !sourceId || !targetId) {
        document.getElementById('userLog').innerHTML = '❌ Заполните все поля!';
        return;
    }
    
    isRunning = true;
    this.disabled = true;
    this.textContent = '⏳ РАБОТА...';
    document.getElementById('stopBtn').style.display = 'block';
    
    const log = document.getElementById('userLog');
    log.innerHTML = '⏳ Инициализация...';
    
    try {
        // Проверка токена
        const test = await fetch('https://discord.com/api/v10/users/@me', {
            headers: { 'Authorization': token }
        });
        if (!test.ok) throw new Error('Неверный токен');
        
        const user = await test.json();
        log.innerHTML = '✅ Авторизован: ' + user.username;
        
        // Загрузка данных
        const roles = await fetch(`https://discord.com/api/v10/guilds/${sourceId}/roles`, {
            headers: { 'Authorization': token }
        }).then(r => r.json());
        
        log.innerHTML += '\n📥 Загружено ролей: ' + roles.length;
        
        // Удаляем старые роли
        const targetRoles = await fetch(`https://discord.com/api/v10/guilds/${targetId}/roles`, {
            headers: { 'Authorization': token }
        }).then(r => r.json());
        
        for (const role of targetRoles) {
            if (role.name !== '@everyone') {
                await fetch(`https://discord.com/api/v10/guilds/${targetId}/roles/${role.id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': token }
                });
                await sleep(300);
            }
        }
        
        log.innerHTML += '\n🗑️ Старые роли удалены';
        
        // Создаём роли
        const sorted = roles.filter(r => r.name !== '@everyone').sort((a, b) => a.position - b.position);
        let count = 0;
        for (const role of sorted) {
            await fetch(`https://discord.com/api/v10/guilds/${targetId}/roles`, {
                method: 'POST',
                headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: role.name,
                    color: role.color,
                    hoist: role.hoist,
                    mentionable: role.mentionable,
                    permissions: role.permissions
                })
            });
            count++;
            await sleep(300);
        }
        
        log.innerHTML += '\n✅ Скопировано ' + count + ' ролей';
        log.innerHTML += '\n🎉 Клонирование завершено!';
        
    } catch (e) {
        log.innerHTML = '❌ Ошибка: ' + e.message;
    }
    
    isRunning = false;
    this.disabled = false;
    this.textContent = '▶ СТАРТ';
    document.getElementById('stopBtn').style.display = 'none';
};

document.getElementById('stopBtn').onclick = function() {
    shouldStop = true;
    this.disabled = true;
    this.textContent = '⏹ ОСТАНОВКА...';
};

document.getElementById('title').addEventListener('dblclick', function() {
    const devBtn = document.getElementById('devTabBtn');
    if (devBtn.style.display === 'none') {
        devBtn.style.display = 'block';
        document.getElementById('devLog').innerHTML = '🔓 Dev режим активирован';
    } else {
        devBtn.style.display = 'none';
        document.getElementById('devLog').style.display = 'none';
    }
});

document.getElementById('userTabBtn').onclick = function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('userLog').style.display = 'block';
    document.getElementById('devLog').style.display = 'none';
    this.classList.add('active');
};

document.getElementById('devTabBtn').onclick = function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('userLog').style.display = 'none';
    document.getElementById('devLog').style.display = 'block';
    this.classList.add('active');
};
</script>
</body>
</html>
