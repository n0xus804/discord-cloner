<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест JS</title>
</head>
<body>
    <h1>Тест JavaScript</h1>
    <button id="testBtn">Нажми меня</button>
    <p id="result">Ожидание...</p>

    <script>
        document.getElementById('testBtn').addEventListener('click', function() {
            document.getElementById('result').textContent = '✅ КНОПКА РАБОТАЕТ!';
        });
    </script>
</body>
</html>
