<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Dynasty Cloner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
        }
        .container {
            background: linear-gradient(145deg, #12122a, #1a1a3e);
            border: 2px solid #6a2be0;
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 0 40px rgba(106, 43, 224, 0.3);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: #b388ff;
            text-align: center;
            letter-spacing: 2px;
            cursor: pointer;
        }
        .header .subtitle {
            color: #7c7cb0;
            font-size: 11px;
            text-align: center;
            letter-spacing: 4px;
        }
        .glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6a2be0, #00e5ff, transparent);
            margin: 18px 0 25px;
        }
        .input-group { margin-bottom: 14px; }
        .input-group label {
            display: block;
            color: #9a9ad6;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(106, 43, 224, 0.3);
            border-radius: 12px;
            color: #d0d0ff;
            font-size: 14px;
            outline: none;
        }
        .settings-panel {
            margin: 14px 0 18px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(106, 43, 224, 0.15);
        }
        .settings-panel .settings-title {
            color: #7c7cb0;
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }
        .settings-grid label {
            color: #9a9ad6;
            font-size: 10px;
            cursor: pointer;
        }
        .settings-grid input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(106, 43, 224, 0.4);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }
        .settings-grid input[type="checkbox"]:checked {
            background: #6a2be0;
            border-color: #6a2be0;
        }
        .settings-grid input[type="checkbox"]:checked::after {
            content: '✓';
            color: white;
            font-size: 12px;
            padding-left: 3px;
        }
        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-start {
            background: linear-gradient(135deg, #6a2be0, #8b5cf6);
            color: white;
        }
        .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-stop {
            background: linear-gradient(135deg, #e94560, #c62828);
            color: white;
            display: none;
        }
        .btn-stop.show { display: block; }
        .tabs {
            display: flex;
            gap: 6px;
            margin-top: 20px;
            border-bottom: 1px solid rgba(106, 43, 224, 0.2);
            padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: #5a5a8a;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .tab-btn.active {
            color: #b388ff;
            background: rgba(106, 43, 224, 0.15);
        }
        .log-container {
            margin-top: 6px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(106, 43, 224, 0.15);
            border-radius: 12px;
            color: #a0a0d0;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            max-height: 200px;
            overflow-y: auto;
            min-height: 100px;
            white-space: pre-wrap;
        }
        .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.idle { background: #4a4a7a; }
        .status-dot.running { background: #00e5ff; }
        .status-dot.done { background: #4caf50; }
        .status-dot.error { background: #e94560; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="title">FLUX DYNASTY</h1>
        <div class="subtitle">✦ SERVER CLONER v2.0 ✦</div>
    </div>
    <div class="glow-line"></div>

    <div class="input-group">
        <label>🔑 Token</label>
        <input type="text" id="token" placeholder="Введите токен...">
    </div>
    <div class="input-group">
        <label>📂 Source Server ID</label>
        <input type="text" id="source" placeholder="ID исходного сервера...">
    </div>
    <div class="input-group">
        <label>🎯 Target Server ID</label>
        <input type="text" id="target" placeholder="ID целевого сервера...">
    </div>

    <div class="settings-panel">
        <div class="settings-title">⚙️ Что копировать</div>
        <div class="settings-grid">
            <label><input type="checkbox" id="copyRoles" checked> Роли</label>
            <label><input type="checkbox" id="copyChannels" checked> Каналы</label>
            <label><input type="checkbox" id="copyCategories" checked> Категории</label>
            <label><input type="checkbox" id="copyVoice" checked> Голосовые</label>
            <label><input type="checkbox" id="copyEmojis" checked> Эмодзи</label>
            <label><input type="checkbox" id="copySettings" checked> Настройки</label>
            <label><input type="checkbox" id="copyIcon" checked> Иконка</label>
            <label><input type="checkbox" id="copyAutoMod" checked> AutoMod</label>
        </div>
    </div>

    <div class="button-row">
        <button class="btn btn-start" id="startBtn">▶ СТАРТ</button>
        <button class="btn btn-stop" id="stopBtn">⏹ СТОП</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="userTabBtn">👤 Лог</button>
        <button class="tab-btn" id="devTabBtn" style="display:none;">⚙️ Dev</button>
    </div>

    <div id="userLog" class="log-container">
        <span class="status-dot idle"></span> Ожидание запуска...
    </div>
    <div id="devLog" class="log-container" style="display:none;">
        <span class="status-dot idle"></span> Dev Log
    </div>
</div>

<script>
// ============================================================
//  РОЛИ ПО ПОРЯДКУ + ПРАВА КАНАЛОВ (ВКЛЮЧАЯ @EVERYONE)
// ============================================================

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let isRunning = false;
let shouldStop = false;
let roleMap = {};
let targetGuildId = null;

document.getElementById('startBtn').addEventListener('click', startClone);
document.getElementById('stopBtn').addEventListener('click', stopClone);

document.getElementById('title').addEventListener('dblclick', function() {
    const btn = document.getElementById('devTabBtn');
    const log = document.getElementById('devLog');
    if (btn.style.display === 'none') {
        btn.style.display = 'block';
        log.style.display = 'block';
        log.innerHTML = '🔓 Dev режим активирован';
    } else {
        btn.style.display = 'none';
        log.style.display = 'none';
    }
});

document.getElementById('userTabBtn').addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('userLog').style.display = 'block';
    document.getElementById('devLog').style.display = 'none';
    this.classList.add('active');
});

document.getElementById('devTabBtn').addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('userLog').style.display = 'none';
    document.getElementById('devLog').style.display = 'block';
    this.classList.add('active');
});

function log(msg, type = 'info') {
    const c = document.getElementById('userLog');
    const dot = c.querySelector('.status-dot');
    const cls = { idle: 'idle', running: 'running', done: 'done', error: 'error' };
    if (dot) dot.className = 'status-dot ' + (cls[type] || 'idle');
    if (type === 'running' || type === 'done' || type === 'error') {
        c.innerHTML = '<span class="status-dot ' + (cls[type] || 'idle') + '"></span> ' + msg;
    } else {
        c.innerHTML += '\n' + msg;
    }
    c.scrollTop = c.scrollHeight;
}

function devLog(msg) {
    const c = document.getElementById('devLog');
    c.innerHTML += '\n' + msg;
    c.scrollTop = c.scrollHeight;
}

async function stopClone() {
    shouldStop = true;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('stopBtn').textContent = '⏹ ОСТАНОВКА...';
    log('⏹ Остановка...', 'running');
}

// ===== ОСНОВНАЯ ФУНКЦИЯ =====
async function startClone() {
    if (isRunning) return;

    const settings = {
        roles: document.getElementById('copyRoles').checked,
        channels: document.getElementById('copyChannels').checked,
        categories: document.getElementById('copyCategories').checked,
        voice: document.getElementById('copyVoice').checked,
        emojis: document.getElementById('copyEmojis').checked,
        settings: document.getElementById('copySettings').checked,
        icon: document.getElementById('copyIcon').checked,
        automod: document.getElementById('copyAutoMod').checked
    };

    const token = document.getElementById('token').value.trim();
    const src = document.getElementById('source').value.trim();
    const dst = document.getElementById('target').value.trim();

    if (!token || !src || !dst) {
        log('❌ Заполните все поля!', 'error');
        return;
    }

    isRunning = true;
    shouldStop = false;
    roleMap = {};
    targetGuildId = dst;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('startBtn').textContent = '⏳ РАБОТА...';
    document.getElementById('stopBtn').className = 'btn btn-stop show';
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('stopBtn').textContent = '⏹ СТОП';

    log('⏳ Инициализация...', 'running');

    try {
        // ===== 1. АВТОРИЗАЦИЯ =====
        const r1 = await fetch('https://discord.com/api/v10/users/@me', {
            headers: { Authorization: token }
        });
        if (!r1.ok) throw new Error('❌ Неверный токен!');
        const user = await r1.json();
        log('✅ Авторизован: ' + user.username + '#' + user.discriminator);

        // ===== 2. ЗАГРУЗКА ДАННЫХ =====
        if (shouldStop) throw new Error('STOP');
        log('📥 Загрузка данных...');

        const guild = await fetch(`https://discord.com/api/v10/guilds/${src}`, {
            headers: { Authorization: token }
        }).then(r => r.json());
        if (guild.code === 10004) throw new Error('❌ Сервер не найден!');

        const roles = await fetch(`https://discord.com/api/v10/guilds/${src}/roles`, {
            headers: { Authorization: token }
        }).then(r => r.json());

        const channels = await fetch(`https://discord.com/api/v10/guilds/${src}/channels`, {
            headers: { Authorization: token }
        }).then(r => r.json());

        let emojis = [];
        if (settings.emojis) {
            emojis = await fetch(`https://discord.com/api/v10/guilds/${src}/emojis`, {
                headers: { Authorization: token }
            }).then(r => r.json());
        }

        log(`✅ Загружено: ${roles.length} ролей, ${channels.length} каналов`);

        // ===== 3. ИКОНКА =====
        if (settings.icon && guild.icon && !shouldStop) {
            log('🔄 [1/7] Копирование иконки...');
            const img = await fetch(`https://cdn.discordapp.com/icons/${src}/${guild.icon}.png`)
                .then(r => r.arrayBuffer());
            const b64 = btoa(String.fromCharCode(...new Uint8Array(img)));
            await fetch(`https://discord.com/api/v10/guilds/${dst}`, {
                method: 'PATCH',
                headers: { Authorization: token, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: guild.name,
                    icon: `data:image/png;base64,${b64}`
                })
            });
            log('✅ Иконка скопирована');
        }

        // ===== 4. РОЛИ =====
        if (settings.roles && !shouldStop) {
            log('🔄 [2/7] Копирование ролей...');

            const oldRoles = await fetch(`https://discord.com/api/v10/guilds/${dst}/roles`, {
                headers: { Authorization: token }
            }).then(r => r.json());

            for (const r of oldRoles) {
                if (r.name !== '@everyone') {
                    await fetch(`https://discord.com/api/v10/guilds/${dst}/roles/${r.id}`, {
                        method: 'DELETE',
                        headers: { Authorization: token }
                    });
                    await sleep(300);
                }
            }
            devLog('🗑️ Старые роли удалены');

            const rolesToCreate = roles.filter(r => r.name !== '@everyone');
            for (const r of rolesToCreate) {
                if (shouldStop) throw new Error('STOP');
                const newRole = await fetch(`https://discord.com/api/v10/guilds/${dst}/roles`, {
                    method: 'POST',
                    headers: { Authorization: token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: r.name,
                        color: r.color,
                        hoist: r.hoist,
                        mentionable: r.mentionable,
                        permissions: r.permissions
                    })
                }).then(rr => rr.json());
                roleMap[r.id] = newRole.id;
                devLog(`✅ Создана: ${r.name} → ${newRole.id}`);
                await sleep(300);
            }
            log(`✅ Создано ${rolesToCreate.length} ролей`);

            // Принудительная перестановка
            await sleep(2000);
            const createdRoles = await fetch(`https://discord.com/api/v10/guilds/${dst}/roles`, {
                headers: { Authorization: token }
            }).then(r => r.json());

            const sortedForReorder = createdRoles
                .filter(r => r.name !== '@everyone')
                .sort((a, b) => {
                    const posA = roles.find(r => r.name === a.name)?.position || 0;
                    const posB = roles.find(r => r.name === b.name)?.position || 0;
                    return posB - posA;
                });

            let pos = sortedForReorder.length - 1;
            for (const r of sortedForReorder) {
                if (shouldStop) throw new Error('STOP');
                await fetch(`https://discord.com/api/v10/guilds/${dst}/roles/${r.id}`, {
                    method: 'PATCH',
                    headers: { Authorization: token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ position: pos })
                });
                devLog(`✅ ${r.name} → позиция ${pos}`);
                pos--;
                await sleep(400);
            }
            log(`✅ Роли переставлены в правильном порядке!`);
        }

        // ===== 5. КАТЕГОРИИ =====
        if (settings.categories && !shouldStop) {
            log('🔄 [3/7] Копирование категорий...');
            const oldChannels = await fetch(`https://discord.com/api/v10/guilds/${dst}/channels`, {
                headers: { Authorization: token }
            }).then(r => r.json());

            for (const ch of oldChannels) {
                await fetch(`https://discord.com/api/v10/channels/${ch.id}`, {
                    method: 'DELETE',
                    headers: { Authorization: token }
                });
                await sleep(300);
            }

            for (const ch of channels) {
                if (ch.type === 4) {
                    await fetch(`https://discord.com/api/v10/guilds/${dst}/channels`, {
                        method: 'POST',
                        headers: { Authorization: token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name: ch.name, type: 4, position: ch.position })
                    });
                    devLog(`✅ Категория: ${ch.name}`);
                    await sleep(300);
                }
            }
            log('✅ Категории скопированы');
        }

        // ===== 6. КАНАЛЫ С ПРАВАМИ (ВКЛЮЧАЯ @EVERYONE) =====
        if ((settings.channels || settings.voice) && !shouldStop) {
            log('🔄 [4/7] Копирование каналов с правами (включая @everyone)...');

            const newChannels = await fetch(`https://discord.com/api/v10/guilds/${dst}/channels`, {
                headers: { Authorization: token }
            }).then(r => r.json());

            const catMap = {};
            for (const nc of newChannels) {
                if (nc.type === 4) catMap[nc.name] = nc.id;
            }

            const types = [];
            if (settings.channels) types.push(0, 5);
            if (settings.voice) types.push(2);

            let count = 0;
            for (const ch of channels) {
                if (shouldStop) throw new Error('STOP');
                if (!types.includes(ch.type)) continue;

                let parentId = null;
                if (ch.parent_id) {
                    const parent = channels.find(c => c.id === ch.parent_id);
                    if (parent && catMap[parent.name]) {
                        parentId = catMap[parent.name];
                    }
                }

                // === КОНВЕРТАЦИЯ ПРАВ (С УЧЁТОМ @EVERYONE) ===
                const overwrites = [];
                if (ch.permission_overwrites && ch.permission_overwrites.length > 0) {
                    for (const ow of ch.permission_overwrites) {
                        let targetId = ow.id;
                        // Если это роль (type === 0)
                        if (ow.type === 0) {
                            // Если это @everyone (ID равен ID сервера)
                            if (ow.id === src) {
                                targetId = dst; // меняем на ID целевого сервера
                            } else if (roleMap[ow.id]) {
                                targetId = roleMap[ow.id];
                            }
                        }
                        overwrites.push({
                            id: targetId,
                            type: ow.type,
                            allow: ow.allow || '0',
                            deny: ow.deny || '0'
                        });
                    }
                }

                const body = {
                    name: ch.name,
                    type: ch.type,
                    parent_id: parentId,
                    position: ch.position,
                    topic: ch.topic || '',
                    bitrate: ch.bitrate || 64000,
                    user_limit: ch.user_limit || 0,
                    nsfw: ch.nsfw || false,
                    permission_overwrites: overwrites
                };

                devLog(`📝 ${ch.name} → ${overwrites.length} правил (включая @everyone)`);

                await fetch(`https://discord.com/api/v10/guilds/${dst}/channels`, {
                    method: 'POST',
                    headers: { Authorization: token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                count++;
                await sleep(300);
            }
            log(`✅ Создано ${count} каналов с правами (включая @everyone)`);
        }

        // ===== 7. ЭМОДЗИ =====
        if (settings.emojis && emojis.length > 0 && !shouldStop) {
            log(`🔄 [5/7] Копирование ${emojis.length} эмодзи...`);
            let count = 0;
            for (const e of emojis) {
                if (shouldStop) throw new Error('STOP');
                try {
                    const ext = e.animated ? 'gif' : 'png';
                    const img = await fetch(`https://cdn.discordapp.com/emojis/${e.id}.${ext}`)
                        .then(r => r.arrayBuffer());
                    const b64 = btoa(String.fromCharCode(...new Uint8Array(img)));
                    await fetch(`https://discord.com/api/v10/guilds/${dst}/emojis`, {
                        method: 'POST',
                        headers: { Authorization: token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: e.name,
                            image: `data:image/${ext};base64,${b64}`
                        })
                    });
                    count++;
                    await sleep(500);
                } catch (err) {
                    devLog(`⚠️ Эмодзи ${e.name} не скопирован`);
                }
            }
            log(`✅ Скопировано ${count} эмодзи`);
        }

        // ===== 8. НАСТРОЙКИ =====
        if (settings.settings && !shouldStop) {
            log('🔄 [6/7] Копирование настроек...');
            await fetch(`https://discord.com/api/v10/guilds/${dst}`, {
                method: 'PATCH',
                headers: { Authorization: token, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    verification_level: guild.verification_level || 0,
                    default_message_notifications: guild.default_message_notifications || 0,
                    explicit_content_filter: guild.explicit_content_filter || 0,
                    afk_timeout: guild.afk_timeout || 300
                })
            });
            log('✅ Настройки скопированы');
        }

        // ===== 9. AUTOMOD =====
        if (settings.automod && !shouldStop) {
            log('🔄 [7/7] Копирование AutoMod...');
            try {
                const rules = await fetch(`https://discord.com/api/v10/guilds/${src}/automod/rules`, {
                    headers: { Authorization: token }
                }).then(r => r.json());
                if (Array.isArray(rules) && rules.length > 0) {
                    for (const rule of rules) {
                        if (shouldStop) throw new Error('STOP');
                        await fetch(`https://discord.com/api/v10/guilds/${dst}/automod/rules`, {
                            method: 'POST',
                            headers: { Authorization: token, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: rule.name,
                                trigger_type: rule.trigger_type,
                                trigger_metadata: rule.trigger_metadata || {},
                                actions: rule.actions || [],
                                enabled: rule.enabled !== false
                            })
                        });
                        await sleep(500);
                    }
                    log(`✅ Скопировано ${rules.length} правил AutoMod`);
                }
            } catch (e) {
                log('⚠️ AutoMod не поддерживается');
            }
        }

        log('🎉 Клонирование завершено!', 'done');

    } catch (err) {
        if (err.message === 'STOP') {
            log('⏹ Остановлено', 'error');
        } else {
            log('❌ Ошибка: ' + err.message, 'error');
        }
    }

    isRunning = false;
    shouldStop = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '▶ СТАРТ';
    document.getElementById('stopBtn').className = 'btn btn-stop';
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('stopBtn').textContent = '⏹ СТОП';
}
</script>
</body>
</html>
