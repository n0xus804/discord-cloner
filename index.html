<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Dynasty Cloner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #12122a, #1a1a3e);
            border: 2px solid #6a2be0;
            border-radius: 24px;
            padding: 35px 25px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 0 40px rgba(106, 43, 224, 0.3), inset 0 0 60px rgba(106, 43, 224, 0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(106, 43, 224, 0.1), transparent, rgba(0, 255, 255, 0.05), transparent);
            animation: rotate 8s linear infinite;
            pointer-events: none;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .header {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #b388ff, #6a2be0, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(106, 43, 224, 0.3);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .header .subtitle {
            color: #7c7cb0;
            font-size: 11px;
            letter-spacing: 4px;
            font-weight: 400;
        }

        .glow-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6a2be0, #00e5ff, #6a2be0, transparent);
            margin: 18px 0 25px;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(106, 43, 224, 0.3);
        }

        .input-group {
            position: relative;
            z-index: 1;
            margin-bottom: 14px;
        }

        .input-group label {
            display: block;
            color: #9a9ad6;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(106, 43, 224, 0.3);
            border-radius: 12px;
            color: #d0d0ff;
            font-size: 14px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #6a2be0;
            box-shadow: 0 0 25px rgba(106, 43, 224, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-group input::placeholder {
            color: #4a4a7a;
            font-size: 11px;
        }

        .settings-panel {
            position: relative;
            z-index: 1;
            margin: 14px 0 18px;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(106, 43, 224, 0.15);
        }

        .settings-panel .settings-title {
            color: #7c7cb0;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px 16px;
        }

        .settings-grid label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #9a9ad6;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .settings-grid label:hover {
            color: #d0d0ff;
        }

        .settings-grid input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            min-width: 16px;
            border: 2px solid rgba(106, 43, 224, 0.4);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .settings-grid input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #6a2be0, #8b5cf6);
            border-color: #6a2be0;
        }

        .settings-grid input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 10px;
            font-weight: 900;
        }

        .settings-grid input[type="checkbox"]:hover {
            border-color: #8b5cf6;
        }

        .button-row {
            display: flex;
            gap: 12px;
            position: relative;
            z-index: 1;
            margin-top: 6px;
        }

        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-start {
            background: linear-gradient(135deg, #6a2be0, #8b5cf6);
            color: white;
            box-shadow: 0 0 30px rgba(106, 43, 224, 0.3);
        }

        .btn-start:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(106, 43, 224, 0.5);
        }

        .btn-start:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-stop {
            background: linear-gradient(135deg, #e94560, #c62828);
            color: white;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
            display: none;
        }

        .btn-stop:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.5);
        }

        .btn-stop:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-stop.show {
            display: block;
        }

        .tabs {
            position: relative;
            z-index: 1;
            display: flex;
            gap: 6px;
            margin-top: 20px;
            border-bottom: 1px solid rgba(106, 43, 224, 0.2);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #5a5a8a;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .tab-btn.active {
            color: #b388ff;
            background: rgba(106, 43, 224, 0.15);
            box-shadow: 0 0 20px rgba(106, 43, 224, 0.1);
        }

        .tab-btn:hover {
            color: #d0d0ff;
        }

        .log-container {
            position: relative;
            z-index: 1;
            margin-top: 6px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(106, 43, 224, 0.15);
            border-radius: 12px;
            color: #a0a0d0;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            line-height: 1.8;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 100px;
        }

        .log-container::-webkit-scrollbar {
            width: 4px;
        }

        .log-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .log-container::-webkit-scrollbar-thumb {
            background: #6a2be0;
            border-radius: 2px;
        }

        .log-container .status-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .log-container .status-dot.idle { background: #4a4a7a; animation: none; }
        .log-container .status-dot.running { background: #00e5ff; animation: pulse 1.5s ease-in-out infinite; }
        .log-container .status-dot.done { background: #4caf50; animation: none; }
        .log-container .status-dot.error { background: #e94560; animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>FLUX DYNASTY</h1>
        <div class="subtitle">✦ SERVER CLONER v2.0 ✦</div>
    </div>
    <div class="glow-line"></div>

    <div class="input-group">
        <label>🔑 Token</label>
        <input type="text" id="token" placeholder="Введите токен бота или пользователя...">
    </div>

    <div class="input-group">
        <label>📂 Source Server ID</label>
        <input type="text" id="source" placeholder="ID исходного сервера...">
    </div>

    <div class="input-group">
        <label>🎯 Target Server ID</label>
        <input type="text" id="target" placeholder="ID целевого сервера...">
    </div>

    <div class="settings-panel">
        <div class="settings-title">⚙️ Что копировать</div>
        <div class="settings-grid">
            <label><input type="checkbox" id="copyRoles" checked> 👥 Роли</label>
            <label><input type="checkbox" id="copyChannels" checked> 💬 Каналы</label>
            <label><input type="checkbox" id="copyCategories" checked> 📁 Категории</label>
            <label><input type="checkbox" id="copyVoice" checked> 🎤 Голосовые</label>
            <label><input type="checkbox" id="copyEmojis" checked> 😀 Эмодзи</label>
            <label><input type="checkbox" id="copySettings" checked> ⚙️ Настройки</label>
            <label><input type="checkbox" id="copyIcon" checked> 🖼️ Иконка</label>
            <label><input type="checkbox" id="copyAutoMod" checked> 🛡️ AutoMod</label>
        </div>
    </div>

    <div class="button-row">
        <button class="btn btn-start" id="startBtn" onclick="startClone()">▶ СТАРТ</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopClone()">⏹ СТОП</button>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="userTabBtn" onclick="switchTab('user')">👤 Лог</button>
        <button class="tab-btn" id="devTabBtn" onclick="switchTab('dev')" style="display:none;">⚙️ Dev</button>
    </div>

    <div id="userLog" class="log-container">
        <span class="status-dot idle"></span> Ожидание запуска...
    </div>

    <div id="devLog" class="log-container" style="display: none;">
        <span class="status-dot idle"></span> Dev Log
    </div>
</div>

<script>
    let isRunning = false;
    let shouldStop = false;
    let devMode = false;

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('userLog').style.display = 'none';
        document.getElementById('devLog').style.display = 'none';

        if (tab === 'user') {
            document.getElementById('userTabBtn').classList.add('active');
            document.getElementById('userLog').style.display = 'block';
        } else if (tab === 'dev') {
            document.getElementById('devTabBtn').classList.add('active');
            document.getElementById('devLog').style.display = 'block';
        }
    }

    document.querySelector('.header h1').addEventListener('dblclick', function() {
        devMode = !devMode;
        document.getElementById('devTabBtn').style.display = devMode ? 'block' : 'none';
        devLog(devMode ? '🔓 Dev режим активирован' : '🔒 Dev режим деактивирован');
    });

    function userLog(message, type = 'info') {
        const container = document.getElementById('userLog');
        const dot = container.querySelector('.status-dot');
        const classes = { 'info': 'idle', 'running': 'running', 'done': 'done', 'error': 'error' };
        if (dot) dot.className = 'status-dot ${classes[type] || 'idle'}';
        
        if (type === 'info' || type === 'running' || type === 'done' || type === 'error') {
            container.innerHTML = '';
            if (dot) container.appendChild(dot);
        }
        container.innerHTML += message;
        container.scrollTop = container.scrollHeight;
    }

    function devLog(message) {
        if (!devMode) return;
        const container = document.getElementById('devLog');
        const time = new Date().toLocaleTimeString('ru-RU', { hour12: false });
        container.innerHTML += '\n[${time}] ${message}';
        container.scrollTop = container.scrollHeight;
    }

    async function stopClone() {
        shouldStop = true;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('stopBtn').textContent = '⏹ ОСТАНОВКА...';
        userLog('⏹ Остановка...', 'running');
        devLog('⏹ Получена команда остановки');
    }

    async function startClone() {
        if (isRunning) return;

        const settings = {
            roles: document.getElementById('copyRoles').checked,
            channels: document.getElementById('copyChannels').checked,
            categories: document.getElementById('copyCategories').checked,
            voice: document.getElementById('copyVoice').checked,
            emojis: document.getElementById('copyEmojis').checked,
            settings: document.getElementById('copySettings').checked,
            icon: document.getElementById('copyIcon').checked,
            automod: document.getElementById('copyAutoMod').checked
        };

        const token = document.getElementById('token').value.trim();
        const sourceId = document.getElementById('source').value.trim();
        const targetId = document.getElementById('target').value.trim();

        if (!token || !sourceId || !targetId) {
            userLog('❌ Заполните все поля!', 'error');
            return;
        }

        isRunning = true;
        shouldStop = false;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').textContent = '⏳ РАБОТА...';
        document.getElementById('stopBtn').className = 'btn btn-stop show';
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('stopBtn').textContent = '⏹ СТОП';

        userLog('⏳ Инициализация...', 'running');
        devLog('🚀 Запуск с настройками: ${JSON.stringify(settings)}');

        try {
            const test = await fetch('https://discord.com/api/v10/users/@me', {
                headers: { 'Authorization': token }
            });
            if (!test.ok) {
                userLog('❌ Неверный токен!', 'error');
                devLog('❌ Ошибка авторизации: токен недействителен');
                throw new Error('Invalid token');
            }
            const user = await test.json();
            userLog('✅ Авторизован: ${user.username}#${user.discriminator}', 'info');
            devLog('✅ Авторизован: ${user.username}#${user.discriminator} (ID: ${user.id})');

            if (shouldStop) throw new Error('STOPPED');
            userLog('📥 Загрузка данных сервера...', 'info');
            devLog('📥 Запрос данных сервера ${sourceId}');

            const sourceGuild = await fetch('https://discord.com/api/v10/guilds/${sourceId}', {
                headers: { 'Authorization': token }
            }).then(r => {
                devLog('📥 GET /guilds/${sourceId} → ${r.status}');
                return r.json();
            });

            if (sourceGuild.code === 10004) {
                userLog('❌ Сервер-источник не найден!', 'error');
                devLog('❌ Сервер не найден (код 10004)');
                throw new Error('Source not found');
            }

            const roles = await fetch('https://discord.com/api/v10/guilds/${sourceId}/roles', {
                headers: { 'Authorization': token }
            }).then(r => r.json());

            const channels = await fetch('https://discord.com/api/v10/guilds/${sourceId}/channels', {
                headers: { 'Authorization': token }
            }).then(r => r.json());

            let emojis = [];
            if (settings.emojis) {
                emojis = await fetch('https://discord.com/api/v10/guilds/${sourceId}/emojis', {
                    headers: { 'Authorization': token }
                }).then(r => r.json());
            }

            userLog('✅ Загружено: ${roles.length} ролей, ${channels.length} каналов, ${emojis.length} эмодзи', 'info');
            devLog('📊 Данные: ${roles.length} ролей, ${channels.length} каналов, ${emojis.length} эмодзи');

            if (settings.icon && sourceGuild.icon && !shouldStop) {
                userLog('🔄 Копирование иконки...', 'info');
                devLog('🔄 Копирование иконки');
                const iconData = await fetch('https://cdn.discordapp.com/icons/${sourceId}/${sourceGuild.icon}.png')
                    .then(r => r.arrayBuffer());
                const base64 = btoa(String.fromCharCode(...new Uint8Array(iconData)));
                await fetch('https://discord.com/api/v10/guilds/${targetId}', {
                    method: 'PATCH',
                    headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: sourceGuild.name,
                        icon: 'data:image/png;base64,${base64}'
                    })
                });
                userLog('✅ Иконка скопирована', 'info');
                devLog('✅ Иконка скопирована');
            }

            if (settings.roles && !shouldStop) {
                userLog('🔄 Копирование ролей...', 'info');
                devLog('🔄 Копирование ролей');

                const targetRoles = await fetch('https://discord.com/api/v10/guilds/${targetId}/roles', {
                    headers: { 'Authorization': token }
                }).then(r => r.json());

                for (const role of targetRoles) {
                    if (shouldStop) throw new Error('STOPPED');
                    if (role.name !== '@everyone') {
                        await fetch('https://discord.com/api/v10/guilds/${targetId}/roles/${role.id}', {
                            method: 'DELETE',
                            headers: { 'Authorization': token }
                        });
                    }
                }

                const sorted = roles.filter(r => r.name !== '@everyone').reverse();
                let count = 0;
                for (const role of sorted) {
                    if (shouldStop) throw new Error('STOPPED');
                    await fetch('https://discord.com/api/v10/guilds/${targetId}/roles', {
                        method: 'POST',
                        headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: role.name,
                            color: role.color,
                            hoist: role.hoist,
                            mentionable: role.mentionable,
                            permissions: role.permissions
                        })
                    });
                    count++;
                }
                userLog('✅ Скопировано ${count} ролей', 'info');
                devLog('✅ Скопировано ${count} ролей');
            }

            if ((settings.channels || settings.categories || settings.voice) && !shouldStop) {
                userLog('🔄 Копирование каналов...', 'info');
                devLog('🔄 Копирование каналов');

                const targetChannels = await fetch('https://discord.com/api/v10/guilds/${targetId}/channels', {
                    headers: { 'Authorization': token }
                }).then(r => r.json());

                for (const ch of targetChannels) {
                    if (shouldStop) throw new Error('STOPPED');
                    await fetch('https://discord.com/api/v10/channels/${ch.id}', {
                        method: 'DELETE',
                        headers: { 'Authorization': token }
                    });
                }

                const categoryMap = {};
                if (settings.categories) {
                    for (const ch of channels) {
                        if (shouldStop) throw new Error('STOPPED');
                        if (ch.type === 4) {
                            const newCat = await fetch('https://discord.com/api/v10/guilds/${targetId}/channels', {
                                method: 'POST',
                                headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                                body: JSON.stringify({ name: ch.name, type: 4, position: ch.position })
                            }).then(r => r.json());
                            categoryMap[ch.id] = newCat.id;
                        }
                    }
                }

                await new Promise(r => setTimeout(r, 1500));

                const newChannels = await fetch('https://discord.com/api/v10/guilds/${targetId}/channels', {
                    headers: { 'Authorization': token }
                }).then(r => r.json());
                const nameToId = {};
                for (const nc of newChannels) {
                    if (nc.type === 4) nameToId[nc.name] = nc.id;
                }

                const types = [];
                if (settings.channels) types.push(0, 5);
                if (settings.voice) types.push(2);

                let count = 0;
                for (const ch of channels) {
                    if (shouldStop) throw new Error('STOPPED');
                    if (!types.includes(ch.type)) continue;
                    const parentId = ch.parent_id ? nameToId[channels.find(c => c.id === ch.parent_id)?.name] : null;
                    await fetch('https://discord.com/api/v10/guilds/${targetId}/channels', {
                        method: 'POST',
                        headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: ch.name,
                            type: ch.type,
                            parent_id: parentId,
                            position: ch.position,
                            topic: ch.topic || '',
                            bitrate: ch.bitrate || 64000,
                            user_limit: ch.user_limit || 0,
                            nsfw: ch.nsfw || false
                        })
                    });
                    count++;
                }
                userLog('✅ Создано ${count} каналов', 'info');
                devLog('✅ Создано ${count} каналов');
            }

            if (settings.emojis && emojis.length > 0 && !shouldStop) {
                userLog('🔄 Копирование ${emojis.length} эмодзи...', 'info');
                devLog('🔄 Копирование ${emojis.length} эмодзи');
                let count = 0;
                for (const emoji of emojis) {
                    if (shouldStop) throw new Error('STOPPED');
                    try {
                        const img = await fetch('https://cdn.discordapp.com/emojis/${emoji.id}.${emoji.animated ? 'gif' : 'png'}')
                            .then(r => r.arrayBuffer());
                        const base64 = btoa(String.fromCharCode(...new Uint8Array(img)));
                        await fetch('https://discord.com/api/v10/guilds/${targetId}/emojis', {
                            method: 'POST',
                            headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: emoji.name,
                                image: 'data:image/${emoji.animated ? 'gif' : 'png'};base64,${base64}'
                            })
                        });
                        count++;
                    } catch (e) {
                        devLog('⚠️ Не удалось скопировать эмодзи ${emoji.name}: ${e.message}');
                    }
                }
                userLog('✅ Скопировано ${count} эмодзи', 'info');
                devLog('✅ Скопировано ${count} эмодзи');
            }

            if (settings.settings && !shouldStop) {
                userLog('🔄 Копирование настроек...', 'info');
                devLog('🔄 Копирование настроек сервера');
                await fetch('https://discord.com/api/v10/guilds/${targetId}', {
                    method: 'PATCH',
                    headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        verification_level: sourceGuild.verification_level || 0,
                        default_message_notifications: sourceGuild.default_message_notifications || 0,
                        explicit_content_filter: sourceGuild.explicit_content_filter || 0,
                        afk_timeout: sourceGuild.afk_timeout || 300
                    })
                });
                userLog('✅ Настройки скопированы', 'info');
                devLog('✅ Настройки скопированы');
            }

            if (settings.automod && !shouldStop) {
                userLog('🔄 Копирование AutoMod...', 'info');
                devLog('🔄 Копирование AutoMod');
                try {
                    const rules = await fetch('https://discord.com/api/v10/guilds/${sourceId}/automod/rules', {
                        headers: { 'Authorization': token }
                    }).then(r => r.json());
                    if (Array.isArray(rules)) {
                        for (const rule of rules) {
                            if (shouldStop) throw new Error('STOPPED');
                            await fetch('https://discord.com/api/v10/guilds/${targetId}/automod/rules', {
                                method: 'POST',
                                headers: { 'Authorization': token, 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    name: rule.name,
                                    trigger_type: rule.trigger_type,
                                    trigger_metadata: rule.trigger_metadata || {},
                                    actions: rule.actions || [],
                                    enabled: rule.enabled !== false
                                })
                            });
                        }
                        userLog('✅ Скопировано ${rules.length} правил AutoMod', 'info');
                        devLog('✅ Скопировано ${rules.length} правил AutoMod');
                    }
                } catch (e) {
                    devLog('⚠️ AutoMod не скопирован: ${e.message}');
                    userLog('⚠️ AutoMod не поддерживается или нет прав', 'info');
                }
            }

            userLog('🎉 Клонирование завершено!', 'done');
            devLog('🎉 Клонирование успешно завершено');

        } catch (error) {
            if (error.message === 'STOPPED') {
                userLog('⏹ Остановлено пользователем', 'error');
                devLog('⏹ Остановлено пользователем');
            } else {
                userLog('❌ Ошибка: ${error.message}', 'error');
                devLog('❌ Ошибка: ${error.message}');
            }
        }

        isRunning = false;
        shouldStop = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').textContent = '▶ СТАРТ';
        document.getElementById('stopBtn').className = 'btn btn-stop';
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('stopBtn').textContent = '⏹ СТОП';
    }
</script>
</body>
</html>
